events {}

http {
  server {
    listen 8080;

    # Common headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # USER SERVICE
    location /api/v1/login {
      proxy_pass http://user-service:5000;
    }

    location /api/v1/verify {
      proxy_pass http://user-service:5000;
    }

    location /api/v1/me {
      proxy_pass http://user-service:5000;
    }

    location /api/v1/user/ {
      proxy_pass http://user-service:5000;
    }

    location /api/v1/update/user {
      proxy_pass http://user-service:5000;
    }

    # CHAT SERVICE
    location /api/v1/chat/ {
      proxy_pass http://chat-service:5002;
    }

    location /api/v1/message {
      proxy_pass http://chat-service:5002;
    }

    location /api/v1/message/ {
      proxy_pass http://chat-service:5002;
    }

    # WEBSOCKET (Socket.io)
    location /socket.io/ {
      proxy_pass http://chat-service:5002;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # NOTIFICATION SERVICE (optional future API)
    location /api/v1/notification/ {
      proxy_pass http://notification-service:5001;
    }

    # Health check
    location /health {
      return 200 'gateway ok';
    }
  }
}